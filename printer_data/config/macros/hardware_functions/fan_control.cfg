[gcode_macro M106]
rename_existing: G106
gcode:
    {% set P = params.P | default(0) | int %}
    {% set S = params.S | default(0) | int %}
    {% if P == 0 %}
        G106 S{S}
    {% else %}
        {% set fan = "auxiliary_fan" if P == 2 else "part_fan" %}
        SET_FAN_SPEED FAN={fan} SPEED={S / 255}
    {% endif %}

[gcode_macro M107]
rename_existing: G107
gcode:
    {% set fan = params.P|default(1)|int %}
	{% if fan == 2 %}
		SET_FAN_SPEED FAN="auxiliary_fan" SPEED=0 
	{% else %}
    	G107
	{% endif %}