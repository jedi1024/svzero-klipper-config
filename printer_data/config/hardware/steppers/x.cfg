[stepper_x]
step_pin: PE1
dir_pin: !PD7
enable_pin: !PD5
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: ^toolhead_mcu:PA10
position_min: -10
position_endstop: -10
position_max: 155
homing_speed: 90
homing_retract_dist: 2

[tmc5160 stepper_x]
cs_pin: PE0
spi_software_mosi_pin: PB6
spi_software_miso_pin: PB5
spi_software_sclk_pin: PB4
interpolate: true
run_current: 3.2
sense_resistor: 0.05

[autotune_tmc stepper_x]
motor: shengyang-42BYGH30250-25D
tbl: 3